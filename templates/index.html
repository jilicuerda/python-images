<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Aligner</title>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #f4f4f9; margin-top: 50px; }
        .upload-container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); display: inline-block; }
        .upload-container div { margin-bottom: 15px; }
        canvas { 
            border: 1px solid #ccc; 
            cursor: grab; 
            background: white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            margin-top: 20px;
        }
        canvas:active { cursor: grabbing; }
        .controls { margin-top: 20px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px;}
        button:hover { background: #0056b3; }
        .instructions { color: #666; margin-bottom: 20px; }
    </style>
</head>
<body>

    <h2>Sample Aligner</h2>

    {% if not image_a or not image_b %}
    <div class="upload-container">
        <p>Upload your samples to begin alignment.</p>
        <form action="/" method="POST" enctype="multipart/form-data">
            <div>
                <label><strong>Image A (Overlay/Moving):</strong></label><br>
                <input type="file" name="file_a" accept="image/*" required>
            </div>
            <div>
                <label><strong>Image B (Base/Static):</strong></label><br>
                <input type="file" name="file_b" accept="image/*" required>
            </div>
            <button type="submit">Upload and Align</button>
        </form>
    </div>
    {% endif %}

    {% if image_a and image_b %}
    <p class="instructions">Drag the overlay image with your mouse. Use <strong>Arrow Keys</strong> for 1-pixel precision.</p>

    <canvas id="alignmentCanvas" width="800" height="600" tabindex="0"></canvas>

    <div class="controls">
        <p>Current Offset: X: <span id="valX">0</span>px, Y: <span id="valY">0</span>px</p>
        <button onclick="saveAlignment()">Save Final Alignment</button>
        <br><br>
        <a href="/">Upload new images</a>
    </div>

    <script>
        const canvas = document.getElementById('alignmentCanvas');
        const ctx = canvas.getContext('2d');
        const valX = document.getElementById('valX');
        const valY = document.getElementById('valY');

        let imgB = new Image(); // The static base image
        let imgA = new Image(); // The moving overlay image

        // State variables
        let offsetX = 0;
        let offsetY = 0;
        let isDragging = false;
        let startX, startY;

        // Load images (served by Flask from the 'static/uploads' folder)
        imgB.src = "/static/uploads/{{ image_b }}";
        imgA.src = "/static/uploads/{{ image_a }}";

        // Resize canvas to match the base image once it loads
        imgB.onload = () => {
            canvas.width = imgB.width;
            canvas.height = imgB.height;
            draw();
        };
        imgA.onload = draw;

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw static base image
            if (imgB.complete) {
                ctx.globalAlpha = 1.0;
                ctx.drawImage(imgB, 0, 0);
            }
            
            // Draw moving image with 50% opacity
            if (imgA.complete) {
                ctx.globalAlpha = 0.5;
                ctx.drawImage(imgA, offsetX, offsetY);
            }

            // Update text displays
            valX.innerText = offsetX;
            valY.innerText = offsetY;
        }

        // --- Mouse Dragging Logic ---
        canvas.addEventListener('mousedown', (e) => {
            isDragging = true;
            // Get coordinates relative to the canvas
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            
            startX = mouseX - offsetX;
            startY = mouseY - offsetY;
            canvas.style.cursor = "grabbing";
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            
            offsetX = mouseX - startX;
            offsetY = mouseY - startY;
            draw();
        });

        canvas.addEventListener('mouseup', () => { isDragging = false; canvas.style.cursor = "grab"; });
        canvas.addEventListener('mouseleave', () => { isDragging = false; });

        // --- Keyboard Pixel Nudging Logic ---
        canvas.focus();
        canvas.addEventListener('keydown', (e) => {
            if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(e.key)) {
                e.preventDefault(); 
                if (e.key === "ArrowUp") offsetY -= 1;
                if (e.key === "ArrowDown") offsetY += 1;
                if (e.key === "ArrowLeft") offsetX -= 1;
                if (e.key === "ArrowRight") offsetX += 1;
                draw();
            }
        });

        // --- Send Data back to Python ---
        function saveAlignment() {
            fetch('/align', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    x: offsetX, 
                    y: offsetY,
                    filename_a: "{{ image_a }}", // Tell Python which files to use
                    filename_b: "{{ image_b }}"
                })
            })
            .then(response => response.json())
            .then(data => alert(data.message))
            .catch(error => console.error('Error:', error));
        }
    </script>
    {% endif %}
</body>
</html>
