<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Rock Sample Aligner</title>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #f4f4f9; margin-top: 20px; }
        .upload-container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); display: inline-block; }
        .upload-container div { margin-bottom: 15px; }
        canvas { border: 1px solid #ccc; cursor: grab; background: white; box-shadow: 0 4px 8px rgba(0,0,0,0.1); margin-top: 10px; }
        canvas:active { cursor: grabbing; }
        .controls { margin-top: 20px; background: white; padding: 15px; display: inline-block; border-radius: 8px; }
        .slider-container { margin-bottom: 15px; font-weight: bold; }
        input[type=range] { width: 300px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px;}
        button:hover { background: #0056b3; }
    </style>
</head>
<body>

    <h2>3D Sample Slicer & Aligner</h2>

    {% if not image_a or not image_b %}
    <div class="upload-container">
        <p>Upload your geological samples (TIFF stacks or standard images).</p>
        <form action="/" method="POST" enctype="multipart/form-data">
            <div>
                <label><strong>Image A (3D Overlay):</strong></label><br>
                <input type="file" name="file_a" required>
            </div>
            <div>
                <label><strong>Image B (Base/Reference):</strong></label><br>
                <input type="file" name="file_b" required>
            </div>
            <button type="submit">Upload and Align</button>
        </form>
    </div>
    {% endif %}

    {% if image_a and image_b %}
    
    <div class="slider-container">
        <label for="zSlider">Z-Axis Slice (Depth): <span id="zValue">0</span></label><br>
        <input type="range" id="zSlider" min="0" max="{{ total_slices - 1 }}" value="0" oninput="updateSlice(this.value)">
    </div>

    <canvas id="alignmentCanvas" width="800" height="600" tabindex="0"></canvas>

    <div class="controls">
        <p>Offset: X: <span id="valX">0</span>px, Y: <span id="valY">0</span>px</p>
        <button onclick="saveAlignment()">Save Final Alignment</button>
        <br><br><a href="/">Upload new images</a>
    </div>

    <script>
        const canvas = document.getElementById('alignmentCanvas');
        const ctx = canvas.getContext('2d');
        const valX = document.getElementById('valX');
        const valY = document.getElementById('valY');
        const zValueDisplay = document.getElementById('zValue');

        let imgB = new Image(); 
        let imgA = new Image(); 

        let offsetX = 0;
        let offsetY = 0;
        let currentZ = 0;
        let isDragging = false;
        let startX, startY;

        // Load base image (slice 0 by default)
        imgB.src = `/slice/{{ image_b }}/0`;
        
        // Initial load for overlay image (slice 0)
        updateSlice(0);

        imgB.onload = () => {
            canvas.width = imgB.width;
            canvas.height = imgB.height;
            draw();
        };
        imgA.onload = draw;

        // --- NEW: Fetch new slice from Python when slider moves ---
        function updateSlice(z) {
            currentZ = z;
            zValueDisplay.innerText = z;
            // Appending a timestamp prevents the browser from caching the old slice image
            imgA.src = `/slice/{{ image_a }}/${z}?t=` + new Date().getTime();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (imgB.complete) {
                ctx.globalAlpha = 1.0;
                ctx.drawImage(imgB, 0, 0);
            }
            if (imgA.complete) {
                ctx.globalAlpha = 0.5;
                ctx.drawImage(imgA, offsetX, offsetY);
            }
            valX.innerText = offsetX;
            valY.innerText = offsetY;
        }

        // --- Dragging & Keyboard Logic Remains the Same ---
        canvas.addEventListener('mousedown', (e) => {
            isDragging = true;
            const rect = canvas.getBoundingClientRect();
            startX = (e.clientX - rect.left) - offsetX;
            startY = (e.clientY - rect.top) - offsetY;
            canvas.style.cursor = "grabbing";
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const rect = canvas.getBoundingClientRect();
            offsetX = (e.clientX - rect.left) - startX;
            offsetY = (e.clientY - rect.top) - startY;
            draw();
        });

        canvas.addEventListener('mouseup', () => { isDragging = false; canvas.style.cursor = "grab"; });
        canvas.addEventListener('mouseleave', () => { isDragging = false; });

        canvas.focus();
        canvas.addEventListener('keydown', (e) => {
            if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(e.key)) {
                e.preventDefault(); 
                if (e.key === "ArrowUp") offsetY -= 1;
                if (e.key === "ArrowDown") offsetY += 1;
                if (e.key === "ArrowLeft") offsetX -= 1;
                if (e.key === "ArrowRight") offsetX += 1;
                draw();
            }
        });

        function saveAlignment() {
            fetch('/align', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    x: offsetX, 
                    y: offsetY,
                    z_index: currentZ, // Tell Python which exact slice was chosen
                    filename_a: "{{ image_a }}",
                    filename_b: "{{ image_b }}"
                })
            })
            .then(response => response.json())
            .then(data => alert(data.message))
            .catch(error => console.error('Error:', error));
        }
    </script>
    {% endif %}
</body>
</html>
